services:

  mysql:
    image: mysql:8
    container_name: transplant-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-azerty}
      MYSQL_DATABASE: vf
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pazerty"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  neo4j:
    image: neo4j:5
    container_name: transplant-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-transplant2024}
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p transplant2024 'RETURN 1;' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: transplant-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vf?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: azerty
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: transplant2024
      JWT_SECRET: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: transplant-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  neo4j_data:
