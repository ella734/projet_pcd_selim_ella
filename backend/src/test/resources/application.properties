# ── Base de données H2 en mémoire (remplace MySQL pour les tests) ────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── Désactiver Neo4j (pas disponible en test) ────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktZG8tbm90LXVzZS1pbi1wcm9k
jwt.expiration=86400000

# ── Rate limiting ────────────────────────────────────────────────────────────
auth.login.max-attempts=5
auth.login.window-seconds=900

# ── Bootstrap admin désactivé ────────────────────────────────────────────────
app.bootstrap-admin.enabled=false
app.bootstrap-admin.username=
app.bootstrap-admin.password=

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000
